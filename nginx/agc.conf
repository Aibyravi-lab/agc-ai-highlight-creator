# AGC AI Highlight Creator — Nginx Configuration
# Deploy to: /etc/nginx/sites-available/agc
# Enable with: sudo ln -s /etc/nginx/sites-available/agc /etc/nginx/sites-enabled/agc
#
# Requires:
#   - certbot: sudo apt install certbot python3-certbot-nginx
#   - Certs:   sudo certbot --nginx -d highlightai.in -d www.highlightai.in -d api.highlightai.in
#
# Services expected on this server:
#   - Next.js frontend:  127.0.0.1:3000
#   - FastAPI backend:   127.0.0.1:8000

# ─── HTTP → HTTPS redirect (all domains) ────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name highlightai.in www.highlightai.in api.highlightai.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend: highlightai.in / www.highlightai.in ──────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name highlightai.in www.highlightai.in;

    ssl_certificate     /etc/letsencrypt/live/highlightai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/highlightai.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/highlightai.in/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS — 1 year; tells browsers to always use HTTPS for this domain
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # www → apex redirect
    if ($host = www.highlightai.in) {
        return 301 https://highlightai.in$request_uri;
    }

    client_max_body_size 500m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─── Backend API: api.highlightai.in ────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.highlightai.in;

    ssl_certificate     /etc/letsencrypt/live/highlightai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/highlightai.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/highlightai.in/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow large video uploads
    client_max_body_size 500m;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
